<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, Roboto, 'Helvetica Neue', Arial, sans-serif">

  <title>Sorted Linked List — authoritative order</title>

  <!-- Header -->
  <text x="400" y="26" text-anchor="middle" font-size="15" font-weight="600" fill="#24292f">
    Sorted Linked List
  </text>
  <text x="400" y="46" text-anchor="middle" font-size="12" fill="#57606a">
    ground truth · acquire/release <tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#24292f">next_</tspan> pointers
  </text>

  <!-- Arrow marker -->
  <defs>
    <marker id="lst-arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#57606a"/>
    </marker>
  </defs>

  <!-- Arrows (draw before nodes) -->
  <g stroke="#57606a" stroke-width="2" fill="none" marker-end="url(#lst-arrow)" stroke-linecap="round">
    <!-- header -> 5 -->    <line x1="113" y1="118" x2="133" y2="118"/>
    <!-- 5 -> 10 -->         <line x1="189" y1="118" x2="211" y2="118"/>
    <!-- 10 -> 20 -->        <line x1="267" y1="118" x2="289" y2="118"/>
    <!-- 20 -> 30 -->        <line x1="345" y1="118" x2="367" y2="118"/>
    <!-- 30 -> 40 -->        <line x1="423" y1="118" x2="445" y2="118"/>
    <!-- 40 -> 50 -->        <line x1="501" y1="118" x2="523" y2="118"/>
    <!-- 50 -> 70 -->        <line x1="579" y1="118" x2="601" y2="118"/>
    <!-- 70 -> tailer -->    <line x1="657" y1="118" x2="679" y2="118"/>
  </g>

  <!-- Nodes -->
  <g text-anchor="middle">

    <!-- header sentinel -->
    <rect x="20" y="88" width="90" height="60" rx="8" fill="#f6f8fa" stroke="#8c959f" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="65" y="124" font-size="13" font-weight="500" fill="#57606a">header</text>

    <!-- 5 -->
    <rect x="134" y="88" width="54" height="60" rx="8" fill="#0969da" stroke="#0550ae" stroke-width="2"/>
    <text x="161" y="124" font-size="16" font-weight="700" fill="#ffffff">5</text>

    <!-- 10 -->
    <rect x="212" y="88" width="54" height="60" rx="8" fill="#0969da" stroke="#0550ae" stroke-width="2"/>
    <text x="239" y="124" font-size="16" font-weight="700" fill="#ffffff">10</text>

    <!-- 20 -->
    <rect x="290" y="88" width="54" height="60" rx="8" fill="#0969da" stroke="#0550ae" stroke-width="2"/>
    <text x="317" y="124" font-size="16" font-weight="700" fill="#ffffff">20</text>

    <!-- 30 -->
    <rect x="368" y="88" width="54" height="60" rx="8" fill="#0969da" stroke="#0550ae" stroke-width="2"/>
    <text x="395" y="124" font-size="16" font-weight="700" fill="#ffffff">30</text>

    <!-- 40 -->
    <rect x="446" y="88" width="54" height="60" rx="8" fill="#0969da" stroke="#0550ae" stroke-width="2"/>
    <text x="473" y="124" font-size="16" font-weight="700" fill="#ffffff">40</text>

    <!-- 50 -->
    <rect x="524" y="88" width="54" height="60" rx="8" fill="#0969da" stroke="#0550ae" stroke-width="2"/>
    <text x="551" y="124" font-size="16" font-weight="700" fill="#ffffff">50</text>

    <!-- 70 -->
    <rect x="602" y="88" width="54" height="60" rx="8" fill="#0969da" stroke="#0550ae" stroke-width="2"/>
    <text x="629" y="124" font-size="16" font-weight="700" fill="#ffffff">70</text>

    <!-- tailer sentinel -->
    <rect x="680" y="88" width="90" height="60" rx="8" fill="#f6f8fa" stroke="#8c959f" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="725" y="124" font-size="13" font-weight="500" fill="#57606a">tailer</text>
  </g>

  <!-- Caption -->
  <text x="400" y="190" text-anchor="middle" font-size="11" fill="#6e7781" font-style="italic">
    Authoritative sorted order — readers walk this list when the tree descent is disrupted.
  </text>
</svg>
