<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" width="720" height="430"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, Roboto, 'Helvetica Neue', Arial, sans-serif">

  <title>Red-Black Tree — approximate index</title>

  <!-- Header -->
  <text x="360" y="26" text-anchor="middle" font-size="15" font-weight="600" fill="#24292f">
    Red-Black Tree
  </text>
  <text x="360" y="46" text-anchor="middle" font-size="12" fill="#57606a">
    approximate index · relaxed-atomic child pointers
  </text>

  <!-- Legend -->
  <g transform="translate(525,72)">
    <rect x="-8" y="-14" width="170" height="28" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
    <circle cx="8" cy="0" r="6" fill="#24292f" stroke="#57606a" stroke-width="1.5"/>
    <text x="22" y="4" font-size="12" font-weight="500" fill="#24292f">BLACK</text>
    <circle cx="90" cy="0" r="6" fill="#cf222e" stroke="#a40e26" stroke-width="1.5"/>
    <text x="104" y="4" font-size="12" font-weight="500" fill="#24292f">RED</text>
  </g>

  <!-- Edges (under nodes) -->
  <g stroke="#57606a" stroke-width="2" fill="none" stroke-linecap="round">
    <!-- level 0 -> level 1 -->
    <line x1="360" y1="120" x2="180" y2="230"/>
    <line x1="360" y1="120" x2="540" y2="230"/>
    <!-- 10 -> 5, 20 -->
    <line x1="180" y1="230" x2="90"  y2="340"/>
    <line x1="180" y1="230" x2="270" y2="340"/>
    <!-- 50 -> 40, 70 -->
    <line x1="540" y1="230" x2="450" y2="340"/>
    <line x1="540" y1="230" x2="630" y2="340"/>
  </g>

  <!-- Nodes -->
  <g font-weight="700" fill="#ffffff" text-anchor="middle">

    <!-- Level 0: 30 BLACK (root) -->
    <circle cx="360" cy="120" r="28" fill="#24292f" stroke="#57606a" stroke-width="2"/>
    <text x="360" y="126" font-size="16">30</text>

    <!-- Level 1: 10 RED -->
    <circle cx="180" cy="230" r="28" fill="#cf222e" stroke="#a40e26" stroke-width="2"/>
    <text x="180" y="236" font-size="16">10</text>

    <!-- Level 1: 50 RED -->
    <circle cx="540" cy="230" r="28" fill="#cf222e" stroke="#a40e26" stroke-width="2"/>
    <text x="540" y="236" font-size="16">50</text>

    <!-- Level 2: 5 BLACK -->
    <circle cx="90"  cy="340" r="26" fill="#24292f" stroke="#57606a" stroke-width="2"/>
    <text x="90"  y="346" font-size="15">5</text>

    <!-- Level 2: 20 BLACK -->
    <circle cx="270" cy="340" r="26" fill="#24292f" stroke="#57606a" stroke-width="2"/>
    <text x="270" y="346" font-size="15">20</text>

    <!-- Level 2: 40 BLACK -->
    <circle cx="450" cy="340" r="26" fill="#24292f" stroke="#57606a" stroke-width="2"/>
    <text x="450" y="346" font-size="15">40</text>

    <!-- Level 2: 70 BLACK -->
    <circle cx="630" cy="340" r="26" fill="#24292f" stroke="#57606a" stroke-width="2"/>
    <text x="630" y="346" font-size="15">70</text>
  </g>

  <!-- Caption -->
  <text x="360" y="402" text-anchor="middle" font-size="11" fill="#6e7781" font-style="italic">
    Used as a positional hint — may be temporarily inconsistent during writer-side rotations.
  </text>
</svg>
